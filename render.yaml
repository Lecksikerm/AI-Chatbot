services:
  - type: web
    name: ai-saas-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false 
      - key: MONGO_URL
        sync: false  
      - key: DATABASE_NAME
        value: ai_saas